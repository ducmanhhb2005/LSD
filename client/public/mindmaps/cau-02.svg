<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1220" viewBox="0 0 1800 1220">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#ecfeff"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.16"/>
  </filter>
</defs>
<rect width="1800" height="1220" fill="url(#bg)"/>
<rect x="35" y="35" width="1730" height="1150" rx="36" fill="none" stroke="#06b6d4" stroke-width="5" opacity="0.55"/>

<text x="900" y="78" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#155e75" text-anchor="middle">SƠ ĐỒ TƯ DUY - CÂU 2</text>
<text x="900" y="120.0" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#334155" text-anchor="middle">Câu 2. Vai trò của Nguyễn Ái Quốc trong việc thành lập Đảng</text>
<text x="900" y="150.0" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#334155" text-anchor="middle">Cộng sản Việt Nam và ý nghĩa lịch sử</text>
<ellipse cx="900" cy="600" rx="285" ry="145" fill="#ffffff" stroke="#06b6d4" stroke-width="6" filter="url(#shadow)"/>
<text x="900" y="538" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#155e75" text-anchor="middle">Câu 2</text>
<text x="900" y="572" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#334155" text-anchor="middle">Chuẩn bị tư tưởng, chính trị, tổ</text>
<text x="900" y="606" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#334155" text-anchor="middle">chức và trực tiếp thống nhất các tổ</text>
<text x="900" y="640" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#334155" text-anchor="middle">chức cộng sản</text>
<path d="M 900 600 C 612.5 600, 612.5 280.0, 325.0 280.0" stroke="#06b6d4" stroke-width="5" fill="none" opacity="0.45"/>
<path d="M 900 600 C 900.0 600, 900.0 225.0, 900.0 225.0" stroke="#06b6d4" stroke-width="5" fill="none" opacity="0.45"/>
<path d="M 900 600 C 1187.5 600, 1187.5 280.0, 1475.0 280.0" stroke="#06b6d4" stroke-width="5" fill="none" opacity="0.45"/>
<path d="M 900 600 C 1187.5 600, 1187.5 900.0, 1475.0 900.0" stroke="#06b6d4" stroke-width="5" fill="none" opacity="0.45"/>
<path d="M 900 600 C 900.0 600, 900.0 985.0, 900.0 985.0" stroke="#06b6d4" stroke-width="5" fill="none" opacity="0.45"/>
<path d="M 900 600 C 612.5 600, 612.5 900.0, 325.0 900.0" stroke="#06b6d4" stroke-width="5" fill="none" opacity="0.45"/>
<rect x="90" y="140" width="470" height="280" rx="26" fill="#ecfeff" stroke="#06b6d4" stroke-width="4" filter="url(#shadow)"/>
<circle cx="124" cy="174" r="20" fill="#06b6d4"/>
<text x="124" y="182" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
<text x="158" y="174.0" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#155e75" text-anchor="start">Tìm đường</text>
<text x="124" y="210" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• 1911 ra đi tìm đường cứu nước</text>
<text x="124" y="237" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Đến với Mác - Lênin</text>
<text x="124" y="264" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Độc lập dân tộc gắn CNXH</text>
<rect x="665" y="85" width="470" height="280" rx="26" fill="#ecfeff" stroke="#06b6d4" stroke-width="4" filter="url(#shadow)"/>
<circle cx="699" cy="119" r="20" fill="#06b6d4"/>
<text x="699" y="127" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
<text x="733" y="119.0" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#155e75" text-anchor="start">Tư tưởng - chính trị</text>
<text x="699" y="155" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Truyền bá Mác - Lênin</text>
<text x="699" y="182" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Đường Kách mệnh</text>
<text x="699" y="209" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Xác lập đường lối vô sản</text>
<rect x="1240" y="140" width="470" height="280" rx="26" fill="#ecfeff" stroke="#06b6d4" stroke-width="4" filter="url(#shadow)"/>
<circle cx="1274" cy="174" r="20" fill="#06b6d4"/>
<text x="1274" y="182" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
<text x="1308" y="174.0" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#155e75" text-anchor="start">Tổ chức</text>
<text x="1274" y="210" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Hội VN Cách mạng Thanh niên</text>
<text x="1274" y="237" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">1925</text>
<text x="1274" y="264" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Đào tạo cán bộ</text>
<text x="1274" y="291" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Công nhân tự phát → tự giác</text>
<rect x="1240" y="760" width="470" height="280" rx="26" fill="#ecfeff" stroke="#06b6d4" stroke-width="4" filter="url(#shadow)"/>
<circle cx="1274" cy="794" r="20" fill="#06b6d4"/>
<text x="1274" y="802" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
<text x="1308" y="794.0" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#155e75" text-anchor="start">Hợp nhất</text>
<text x="1274" y="830" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Hội nghị 2/1930</text>
<text x="1274" y="857" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Thành lập ĐCSVN</text>
<text x="1274" y="884" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Thông qua văn kiện đầu tiên</text>
<rect x="665" y="845" width="470" height="280" rx="26" fill="#ecfeff" stroke="#06b6d4" stroke-width="4" filter="url(#shadow)"/>
<circle cx="699" cy="879" r="20" fill="#06b6d4"/>
<text x="699" y="887" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
<text x="733" y="879.0" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#155e75" text-anchor="start">Ý nghĩa</text>
<text x="699" y="915" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Bước ngoặt vĩ đại</text>
<text x="699" y="942" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Chấm dứt khủng hoảng</text>
<text x="699" y="969" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Gắn CMVN với CM thế giới</text>
<rect x="90" y="760" width="470" height="280" rx="26" fill="#ecfeff" stroke="#06b6d4" stroke-width="4" filter="url(#shadow)"/>
<circle cx="124" cy="794" r="20" fill="#06b6d4"/>
<text x="124" y="802" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">6</text>
<text x="158" y="794.0" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#155e75" text-anchor="start">Mẹo nhớ</text>
<text x="124" y="830" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• T-T-H-Ý</text>
<text x="124" y="857" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Tìm - Truyền</text>
<text x="124" y="884" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Hợp nhất - Ý nghĩa</text>
<rect x="130" y="1140" width="1540" height="50" rx="25" fill="#ffffff" stroke="#06b6d4" stroke-width="3" opacity="0.9"/>
<text x="900" y="1173.0" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#155e75" text-anchor="middle">Mẹo nhớ: T-T-H-Ý = Tìm đường cứu nước, Truyền bá và chuẩn bị, Hợp nhất tổ chức cộng sản, Ý nghĩa lịch sử của Đảng.</text>
</svg>