<text x="124" y="802" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">6</text>
<text x="158" y="794.0" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#92400e" text-anchor="start">Mẹo nhớ</text>
<text x="124" y="830" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• NA-CHẮC-DÂN-THẮNG</text>
<text x="124" y="857" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Nava - Chắc - Dân - Thắng</text>
<rect x="130" y="1140" width="1540" height="50" rx="25" fill="#ffffff" stroke="#f59e0b" stroke-width="3" opacity="0.9"/>
<text x="900" y="1173.0" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#92400e" text-anchor="middle">Mẹo nhớ: NA-CHẮC-DÂN-THẮNG = Nava thất bại, đánh chắc tiến chắc, toàn dân hậu cần, thắng lợi toàn cầu.</text>
