<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1220" viewBox="0 0 1800 1220">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#fef2f2"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.16"/>
  </filter>
</defs>
<rect width="1800" height="1220" fill="url(#bg)"/>
<rect x="35" y="35" width="1730" height="1150" rx="36" fill="none" stroke="#ef4444" stroke-width="5" opacity="0.55"/>

<text x="900" y="78" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#991b1b" text-anchor="middle">SƠ ĐỒ TƯ DUY - CÂU 5</text>
<text x="900" y="120.0" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#334155" text-anchor="middle">Câu 5. Hoàn cảnh, nội dung và ý nghĩa Chỉ thị &#x27;Kháng chiến</text>
<text x="900" y="150.0" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#334155" text-anchor="middle">kiến quốc&#x27; ngày 25/11/1945</text>
<ellipse cx="900" cy="600" rx="285" ry="145" fill="#ffffff" stroke="#ef4444" stroke-width="6" filter="url(#shadow)"/>
<text x="900" y="538" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#991b1b" text-anchor="middle">Câu 5</text>
<text x="900" y="572" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#334155" text-anchor="middle">Bảo vệ chính quyền non trẻ trong</text>
<text x="900" y="606" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#334155" text-anchor="middle">tình thế &#x27;ngàn cân treo sợi tóc&#x27;</text>
<path d="M 900 600 C 612.5 600, 612.5 280.0, 325.0 280.0" stroke="#ef4444" stroke-width="5" fill="none" opacity="0.45"/>
<path d="M 900 600 C 900.0 600, 900.0 225.0, 900.0 225.0" stroke="#ef4444" stroke-width="5" fill="none" opacity="0.45"/>
<path d="M 900 600 C 1187.5 600, 1187.5 280.0, 1475.0 280.0" stroke="#ef4444" stroke-width="5" fill="none" opacity="0.45"/>
<path d="M 900 600 C 1187.5 600, 1187.5 900.0, 1475.0 900.0" stroke="#ef4444" stroke-width="5" fill="none" opacity="0.45"/>
<path d="M 900 600 C 900.0 600, 900.0 985.0, 900.0 985.0" stroke="#ef4444" stroke-width="5" fill="none" opacity="0.45"/>
<path d="M 900 600 C 612.5 600, 612.5 900.0, 325.0 900.0" stroke="#ef4444" stroke-width="5" fill="none" opacity="0.45"/>
<rect x="90" y="140" width="470" height="280" rx="26" fill="#fef2f2" stroke="#ef4444" stroke-width="4" filter="url(#shadow)"/>
<circle cx="124" cy="174" r="20" fill="#ef4444"/>
<text x="124" y="182" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
<text x="158" y="174.0" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#991b1b" text-anchor="start">Hoàn cảnh</text>
<text x="124" y="210" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Chính quyền non trẻ</text>
<text x="124" y="237" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Giặc đói - giặc dốt</text>
<text x="124" y="264" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Thù trong giặc ngoài</text>
<rect x="665" y="85" width="470" height="280" rx="26" fill="#fef2f2" stroke="#ef4444" stroke-width="4" filter="url(#shadow)"/>
<circle cx="699" cy="119" r="20" fill="#ef4444"/>
<text x="699" y="127" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
<text x="733" y="119.0" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#991b1b" text-anchor="start">Nhận định</text>
<text x="699" y="155" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Giải phóng dân tộc</text>
<text x="699" y="182" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Dân tộc trên hết</text>
<text x="699" y="209" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Tổ quốc trên hết</text>
<rect x="1240" y="140" width="470" height="280" rx="26" fill="#fef2f2" stroke="#ef4444" stroke-width="4" filter="url(#shadow)"/>
<circle cx="1274" cy="174" r="20" fill="#ef4444"/>
<text x="1274" y="182" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
<text x="1308" y="174.0" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#991b1b" text-anchor="start">Kẻ thù chính</text>
<text x="1274" y="210" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Thực dân Pháp xâm lược</text>
<text x="1274" y="237" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Phản động tay sai</text>
<text x="1274" y="264" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Không để đối đầu cùng lúc</text>
<rect x="1240" y="760" width="470" height="280" rx="26" fill="#fef2f2" stroke="#ef4444" stroke-width="4" filter="url(#shadow)"/>
<circle cx="1274" cy="794" r="20" fill="#ef4444"/>
<text x="1274" y="802" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
<text x="1308" y="794.0" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#991b1b" text-anchor="start">4 nhiệm vụ</text>
<text x="1274" y="830" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Củng cố chính quyền</text>
<text x="1274" y="857" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Chống Pháp</text>
<text x="1274" y="884" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Bài trừ nội phản</text>
<text x="1274" y="911" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Cải thiện dân sinh</text>
<rect x="665" y="845" width="470" height="280" rx="26" fill="#fef2f2" stroke="#ef4444" stroke-width="4" filter="url(#shadow)"/>
<circle cx="699" cy="879" r="20" fill="#ef4444"/>
<text x="699" y="887" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
<text x="733" y="879.0" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#991b1b" text-anchor="start">Sách lược</text>
<text x="699" y="915" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Mềm dẻo</text>
<text x="699" y="942" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Nhân nhượng có nguyên tắc</text>
<text x="699" y="969" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Tranh thủ thời gian</text>
<rect x="90" y="760" width="470" height="280" rx="26" fill="#fef2f2" stroke="#ef4444" stroke-width="4" filter="url(#shadow)"/>
<circle cx="124" cy="794" r="20" fill="#ef4444"/>
<text x="124" y="802" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">6</text>
<text x="158" y="794.0" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#991b1b" text-anchor="start">Ý nghĩa</text>
<text x="124" y="830" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Giữ chính quyền</text>
<text x="124" y="857" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Chuẩn bị kháng chiến</text>
<text x="124" y="884" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Vượt thế hiểm nghèo</text>
<rect x="130" y="1140" width="1540" height="50" rx="25" fill="#ffffff" stroke="#ef4444" stroke-width="3" opacity="0.9"/>
<text x="900" y="1173.0" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#991b1b" text-anchor="middle">Mẹo nhớ: C-Q-P-D = Củng cố Chính quyền, chống Quân Pháp, bài trừ Phản động, chăm lo Dân sinh.</text>
