<text x="1274" y="830" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Hậu phương</text>
<text x="1274" y="857" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Dân công</text>
<text x="1274" y="884" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Pháo binh - công binh</text>
