<text x="900" y="120.0" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#334155" text-anchor="middle">Câu 8. Đại hội III của Đảng (9/1960): đường lối đồng thời hai</text>
<text x="900" y="150.0" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#334155" text-anchor="middle">chiến lược cách mạng</text>
