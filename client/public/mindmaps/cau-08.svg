<text x="1274" y="830" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• CM dân tộc dân chủ</text>
<text x="1274" y="857" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Tiền tuyến lớn</text>
<text x="1274" y="884" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Quyết định trực tiếp</text>
<rect x="665" y="845" width="470" height="280" rx="26" fill="#fdf2f8" stroke="#ec4899" stroke-width="4" filter="url(#shadow)"/>
<circle cx="699" cy="879" r="20" fill="#ec4899"/>
<text x="699" y="887" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
<text x="733" y="879.0" font-family="Arial, sans-serif" font-size="25" font-weight="800" fill="#9d174d" text-anchor="start">Quan hệ</text>
<text x="699" y="915" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Hai chiến lược song song</text>
<text x="699" y="942" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Gắn bó mật thiết</text>
<text x="699" y="969" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1e293b">• Mục tiêu chung: thống nhất</text>
