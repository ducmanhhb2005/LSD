<rect x="35" y="35" width="1730" height="1150" rx="36" fill="none" stroke="#f59e0b" stroke-width="5" opacity="0.55"/>

<text x="900" y="78" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#92400e" text-anchor="middle">SƠ ĐỒ TƯ DUY - CÂU 7</text>
<text x="900" y="120.0" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#334155" text-anchor="middle">Câu 7. Chủ trương của Đảng khi mở chiến dịch Điện Biên Phủ</text>
<text x="900" y="150.0" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#334155" text-anchor="middle">1954 và ý nghĩa &#x27;lừng lẫy năm châu, chấn động địa cầu&#x27;</text>
